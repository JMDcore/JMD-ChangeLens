version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Atlantic/Canary
    open-pull-requests-limit: 8
    groups:
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Atlantic/Canary

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /apps/worker
    schedule:
      interval: monthly
