name: Bug report
description: Report a reproducible problem in ChangeLens.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Please do not disclose security vulnerabilities here. Follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Create a monitor…"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main / commit SHA
    validations:
      required: true
  - type: dropdown
    id: renderer
    attributes:
      label: Affected renderer
      options: [Static HTML, Playwright browser, Both, Not applicable]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove URLs, cookies, tokens, webhook secrets and personal data.
      render: shell
