<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Orbit keyboard — ChangeLens demo</title>
    <style>
      body {
        background: #0d1020;
        color: #eef0ff;
        font-family: system-ui;
        margin: 0;
        padding: 8vw;
      }
      main {
        max-width: 820px;
        margin: auto;
      }
      .label {
        color: #a99cff;
        font: 11px monospace;
        letter-spacing: 0.12em;
      }
      h1 {
        font-size: 58px;
        letter-spacing: -3px;
        margin: 18px 0;
      }
      .state {
        color: #ffca78;
      }
      .keyboard {
        background: linear-gradient(145deg, #252a48, #15182d);
        border: 1px solid #42486f;
        border-radius: 18px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(12, 1fr);
        margin: 50px 0;
        padding: 22px;
        transform: perspective(600px) rotateX(14deg);
      }
      .keyboard i {
        background: #353b62;
        border-radius: 5px;
        box-shadow: 0 3px #171a30;
        height: 32px;
      }
      .price {
        font: 28px monospace;
      }
      .copy {
        color: #9198bd;
        line-height: 1.7;
        max-width: 520px;
      }
    </style>
    <script>
      document.documentElement.dataset.rendered = "true";
    </script>
  </head>
  <body>
    <main>
      <span class="label">CONTROLLED JAVASCRIPT DEMO</span>
      <h1>Orbit 75 mechanical keyboard</h1>
      <div class="state" data-stock>Pre-order · dispatches August 12</div>
      <div class="keyboard">
        <script>
          for (let i = 0; i < 48; i++) document.write("<i></i>");
        </script>
      </div>
      <div class="price" data-price="184">€184.00</div>
      <p class="copy">Hot-swappable low-profile switches, CNC aluminium frame and a programmable rotary encoder.</p>
    </main>
  </body>
</html>
